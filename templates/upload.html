{% extends "base.html" %}

{% block title %}截图识别 - 巡检数据可视化{% endblock %}

{% block content %}
<h1 class="mb-4">截图识别</h1>

<div class="row g-4">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">上传截图</h5>
                <p class="card-text mb-3">支持粘贴 (Ctrl+V)、拖拽或点击选择巡检表单截图</p>

                <div id="drop-zone" class="drop-zone">
                    <div class="drop-zone-content">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                        <p>在此粘贴或拖入截图</p>
                        <small class="text-muted">Ctrl+V 粘贴 / 拖拽文件 / 点击选择</small>
                    </div>
                    <input type="file" id="file-input" accept="image/*" style="display:none">
                </div>

                <div id="preview-container" style="display:none" class="mt-3">
                    <img id="preview-img" class="img-fluid rounded" style="max-height:300px;width:100%;object-fit:contain;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;">
                    <div class="mt-2 d-flex gap-2">
                        <button id="btn-ocr" class="btn btn-primary flex-fill">开始识别</button>
                        <button id="btn-clear" class="btn btn-outline-danger">清除</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="col-lg-6">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">识别结果</h5>
                <div id="ocr-status" class="mb-3"></div>
                <div id="ocr-results" class="mb-3"></div>
                <div id="save-status" class="mb-3"></div>
                <button id="btn-save" class="btn btn-primary" style="display:none">确认保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const previewContainer = document.getElementById('preview-container');
    const previewImg = document.getElementById('preview-img');
    const btnOcr = document.getElementById('btn-ocr');
    const btnClear = document.getElementById('btn-clear');
    const btnSave = document.getElementById('btn-save');
    const ocrStatus = document.getElementById('ocr-status');
    const ocrResults = document.getElementById('ocr-results');
    const saveStatus = document.getElementById('save-status');

    let currentImage = null;
    let currentItems = [];
    let currentFilename = '';

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFile(e.dataTransfer.files[0]);
    });

    document.addEventListener('paste', (e) => {
        const items = e.clipboardData.items;
        for (const item of items) {
            if (item.type.startsWith('image/')) {
                handleFile(item.getAsFile());
                break;
            }
        }
    });

    function handleFile(file) {
        if (!file || !file.type.startsWith('image/')) return;
        // 提取文件名（去掉扩展名）
        currentFilename = file.name ? file.name.replace(/\.[^.]+$/, '') : '';
        const reader = new FileReader();
        reader.onload = (e) => {
            currentImage = e.target.result;
            previewImg.src = currentImage;
            previewContainer.style.display = 'block';
            dropZone.style.display = 'none';
            ocrResults.innerHTML = '';
            ocrStatus.innerHTML = '';
            saveStatus.innerHTML = '';
            btnSave.style.display = 'none';
            currentItems = [];
        };
        reader.readAsDataURL(file);
    }

    btnClear.addEventListener('click', () => {
        currentImage = null;
        currentFilename = '';
        previewContainer.style.display = 'none';
        dropZone.style.display = 'block';
        ocrResults.innerHTML = '';
        ocrStatus.innerHTML = '';
        saveStatus.innerHTML = '';
        btnSave.style.display = 'none';
        currentItems = [];
        fileInput.value = '';
    });

    btnOcr.addEventListener('click', async () => {
        if (!currentImage) return;
        ocrStatus.innerHTML = '<div class="alert alert-info">识别中...</div>';
        btnSave.style.display = 'none';
        ocrResults.innerHTML = '';

        try {
            const resp = await fetch('/api/ocr', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({image: currentImage, filename: currentFilename})
            });
            const data = await resp.json();
            if (data.error) {
                ocrStatus.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                return;
            }
            currentItems = data.items || [];
            if (currentItems.length === 0) {
                ocrStatus.innerHTML = '<div class="alert alert-warning">未识别到巡检记录</div>';
                if (data.raw_lines && data.raw_lines.length > 0) {
                    ocrResults.innerHTML = '<div class="section-title mt-3">OCR 原始文本</div><pre style="font-size:0.75rem;color:var(--text-dim);max-height:200px;overflow:auto;background:var(--bg-input);padding:0.75rem;border-radius:8px;">' + data.raw_lines.join('\n') + '</pre>';
                }
                return;
            }

            ocrStatus.innerHTML = `<div class="alert alert-success">识别到 ${currentItems.length} 条巡检记录</div>`;
            renderItems(currentItems);
            btnSave.style.display = 'block';
        } catch(e) {
            ocrStatus.innerHTML = `<div class="alert alert-danger">请求失败: ${e.message}</div>`;
        }
    });

    let allPoints = [];
    let allInspectors = [];

    async function loadData() {
        try {
            const respPoints = await fetch('/api/points/list');
            if (respPoints.ok) allPoints = await respPoints.json();
            const respInspectors = await fetch('/api/inspectors/list');
            if (respInspectors.ok) allInspectors = await respInspectors.json();
        } catch(e) {}
    }
    loadData();

    function matchPoint(item) {
        let best = null, bestScore = 0;
        const name = (item.point_name || '').toLowerCase();
        const skipLocation = item.skip_location_match;
        const location = skipLocation ? '' : (item.location || '').toLowerCase();
        const ocrLocation = skipLocation ? '' : (item.ocr_location || '').toLowerCase();
        const expectedType = item.dashboard_category || item.dashboard_type_name || ({ 'monitor': '监控', 'vehicle': '车辆', 'badge': '工牌' }[item.dashboard_type] || '');
        for (const p of allPoints) {
            if (expectedType && (!p.device_type || p.device_type.toLowerCase() !== expectedType.toLowerCase())) continue;
            let score = 0;
            let hasNameMatch = false;
            let hasLocationMatch = false;
            const pointName = (p.name || '').toLowerCase();
            const pLocation = (p.location || '').toLowerCase();
            if (pointName && (name.includes(pointName) || pointName.includes(name))) { score += 20; hasNameMatch = true; }
            if (location && pLocation && location === pLocation) { score += 30; hasLocationMatch = true; }
            else if (location && pLocation && location.includes(pLocation)) { score += 20; hasLocationMatch = true; }
            else if (location && pLocation && pLocation.includes(location)) { score += 15; hasLocationMatch = true; }
            else if (ocrLocation && pLocation && ocrLocation === pLocation) { score += 30; hasLocationMatch = true; }
            else if (ocrLocation && pLocation && ocrLocation.includes(pLocation)) { score += 20; hasLocationMatch = true; }
            else if (ocrLocation && pLocation && pLocation.includes(ocrLocation)) { score += 15; hasLocationMatch = true; }
            if (location && pointName && location.includes(pointName)) score += 10;
            if (location && pointName && pointName.includes(location)) score += 25;
            if (ocrLocation && pointName && ocrLocation.includes(pointName)) score += 10;
            if (ocrLocation && pointName && pointName.includes(ocrLocation)) score += 25;
            if (p.device_type) {
                const dtype = p.device_type.toLowerCase();
                if (name.includes(dtype)) score += 5;
            }
            if ((hasNameMatch || hasLocationMatch) && score > bestScore) { bestScore = score; best = p; }
        }
        return best;
    }

    function matchInspector(item) {
        const name = (item.inspector || '').toLowerCase();
        for (const i of allInspectors) {
            if ((i.name || '').toLowerCase() === name) return i;
        }
        return null;
    }

    function renderItems(items) {
        let html = '';

        items.forEach((item, i) => {
            const matchedPoint = matchPoint(item);
            const matchedInspector = matchInspector(item);
            item.point_id = matchedPoint ? matchedPoint.id : null;
            item.inspector_id = matchedInspector ? matchedInspector.id : null;

            const timestamp = item.timestamp ? formatTime(item.timestamp) : '未知时间';
            const resultBadge = item.result === '正常' 
                ? '<span class="result-badge result-ok">正常</span>'
                : item.result === '异常'
                ? '<span class="result-badge result-err">异常</span>'
                : '<span class="result-badge result-warn">需关注</span>';

            let locationBadge = '';
            if (item.location) {
                locationBadge = `<span class="location-badge">${escHtml(item.location)}</span>`;
            } else if (matchedPoint && matchedPoint.location) {
                locationBadge = `<span class="location-badge">${escHtml(matchedPoint.location)}</span>`;
            }
            let pointBadge;
            if (matchedPoint) {
                pointBadge = `<span class="point-badge">${escHtml(matchedPoint.name)}</span>`;
            } else {
                let opts = '<option value="">选择对象</option>';
                const ocrName = (item.point_name || '').toLowerCase();
                const ocrLocation = (item.location || '').toLowerCase();
                const filterType = item.dashboard_type_name || '';
                var filteredPoints = filterType
                    ? allPoints.filter(function(p) { return (p.device_type || '').toLowerCase() === filterType.toLowerCase(); })
                    : allPoints;
                var noTypeMatch = filterType && filteredPoints.length === 0;
                const sorted = [...filteredPoints].sort((a, b) => {
                    const aName = (a.name || '').toLowerCase();
                    const bName = (b.name || '').toLowerCase();
                    const aLoc = (a.location || '').toLowerCase();
                    const bLoc = (b.location || '').toLowerCase();
                    if (ocrName && aName && ocrName.includes(aName) && !(ocrName.includes(bName))) return -1;
                    if (ocrName && bName && ocrName.includes(bName) && !(ocrName.includes(aName))) return 1;
                    if (ocrLocation && aLoc && ocrLocation.includes(aLoc) && !(ocrLocation.includes(bLoc))) return -1;
                    if (ocrLocation && bLoc && ocrLocation.includes(bLoc) && !(ocrLocation.includes(aLoc))) return 1;
                    return (a.name || '').localeCompare(b.name || '');
                });
                let autoSelectedId = null;
                sorted.forEach(p => {
                    const pName = (p.name || '').toLowerCase();
                    const isAutoSelected = (ocrName && pName && (ocrName.includes(pName) || pName.includes(ocrName))) ||
                                           (ocrLocation && p.location && ocrLocation.includes((p.location || '').toLowerCase()));
                    const selected = isAutoSelected ? ' selected' : '';
                    if (isAutoSelected) autoSelectedId = p.id;
                    opts += `<option value="${p.id}"${selected}>${escHtml(p.name)} ${p.location ? '(' + escHtml(p.location) + ')' : ''}</option>`;
                });
                if (autoSelectedId) item.point_id = autoSelectedId;
                var tip = noTypeMatch ? '暂无此类型对象，点击创建' : '快速创建巡检对象';
                pointBadge = `<div class="point-select-group">
                    <select class="point-select" onchange="currentItems[${i}].point_id=this.value||null; this.className=this.value?'point-select point-ok':'point-select point-err'; reevaluateStatus(${i}, this.value);">${opts}</select>
                    <button class="quick-create-btn" onclick="quickCreateObject(${i})" title="${tip}"${noTypeMatch ? ' style="background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700;"' : ''}>+</button>
                </div>`;
            }

            let inspectorBadge;
            if (matchedInspector) {
                inspectorBadge = `<span class="inspector-badge">${escHtml(matchedInspector.name)}</span>`;
            } else if (item.inspector) {
                let opts = '<option value="">选择人员</option>';
                allInspectors.forEach(ins => {
                    opts += `<option value="${ins.id}">${escHtml(ins.name)}</option>`;
                });
                inspectorBadge = `<select class="inspector-select" onchange="currentItems[${i}].inspector_id=this.value||null; this.className=this.value?'inspector-select inspector-ok':'inspector-select inspector-err';">${opts}</select>`;
            } else {
                inspectorBadge = '';
            }

            var dashLabel = item.dashboard_type_name ? `<span class="dashboard-badge">${escHtml(item.dashboard_category || item.dashboard_type_name)}</span>` : '';
            var leftBadge = matchedPoint ? `<span class="point-badge">${escHtml(matchedPoint.name)}</span>` : '';
            var locText = item.location || (matchedPoint && matchedPoint.location) || '';
            var locationCatBadge = (locText || dashLabel) ? `<span class="location-cat-badge">${escHtml(locText)}${dashLabel ? ' ' + escHtml(item.dashboard_category || item.dashboard_type_name) : ''}</span>` : '';
            html += `<div class="ocr-card">
                <div class="ocr-card-header">
                    ${leftBadge}
                    <input type="text" class="ocr-title-input" value="${escAttr(item.point_name)}" onchange="currentItems[${i}].point_name=this.value;">
                    <div class="ocr-card-actions">${locationCatBadge}${matchedPoint ? '' : pointBadge}<button class="ocr-del-btn" onclick="removeItem(${i})">&#10005;</button></div>
                </div>
                <div class="ocr-card-body">
                    <span class="ocr-time">${escHtml(timestamp)}</span>
                    ${resultBadge}
                    ${inspectorBadge}
                    ${item.status_detail ? `<span class="ocr-status-detail">${escHtml(item.status_detail)}</span>` : ''}
                </div>
            </div>`;
        });
        ocrResults.innerHTML = html;
    }

    function formatTime(t) {
        if (typeof t === 'string') {
            try {
                const d = new Date(t);
                return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
            } catch(e) { return t; }
        }
        return t;
    }

    window.removeItem = function(idx) {
        currentItems.splice(idx, 1);
        if (currentItems.length === 0) {
            ocrResults.innerHTML = '';
            btnSave.style.display = 'none';
            ocrStatus.innerHTML = '<div class="alert alert-warning">没有要保存的记录</div>';
        } else {
            renderItems(currentItems);
        }
    };

    window.quickCreateObject = function(idx) {
        const item = currentItems[idx];
        const suggestedName = item.ocr_location || item.location || item.point_name || '';
        const suggestedLocation = item.ocr_location || item.location || '';
        const deviceType = item.dashboard_category || '';

        const modal = document.createElement('div');
        modal.className = 'quick-create-modal';
        modal.innerHTML = `
            <div class="quick-create-dialog">
                <h5>快速创建巡检对象</h5>
                <input type="hidden" id="qc-device-type" value="${escAttr(deviceType)}">
                <div class="mb-3">
                    <label class="form-label">名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="qc-name" value="${escAttr(suggestedName)}" placeholder="输入巡检对象名称">
                </div>
                <div class="mb-3">
                    <label class="form-label">位置</label>
                    <input type="text" class="form-control" id="qc-location" value="${escAttr(suggestedLocation)}" placeholder="输入位置（可选）">
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-primary flex-fill" id="qc-confirm">创建并保存</button>
                    <button class="btn btn-outline-secondary" id="qc-cancel">取消</button>
                </div>
                <div id="qc-status" class="mt-2"></div>
            </div>
        `;
        document.body.appendChild(modal);

        modal.querySelector('#qc-cancel').addEventListener('click', () => modal.remove());
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });

        modal.querySelector('#qc-confirm').addEventListener('click', async () => {
            const name = modal.querySelector('#qc-name').value.trim();
            if (!name) {
                modal.querySelector('#qc-status').innerHTML = '<div class="text-danger">名称不能为空</div>';
                return;
            }
            const statusEl = modal.querySelector('#qc-status');
            statusEl.innerHTML = '<div class="text-info">创建中...</div>';

            try {
                const resp = await fetch('/api/objects/quick-create', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: name,
                        location: modal.querySelector('#qc-location').value.trim(),
                        device_type: modal.querySelector('#qc-device-type').value
                    })
                });
                const data = await resp.json();
                if (data.error) {
                    statusEl.innerHTML = `<div class="text-danger">${data.error}</div>`;
                    return;
                }
                allPoints.push({id: data.id, name: data.name, location: modal.querySelector('#qc-location').value.trim(), device_type: modal.querySelector('#qc-device-type').value});
                currentItems[idx].point_id = data.id;
                if (item.dashboard_type_name) {
                    fetch(`/api/objects/${data.id}/sync-metrics`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ dashboard_type_name: item.dashboard_type_name })
                    });
                }
                modal.remove();
                renderItems(currentItems);
                ocrStatus.innerHTML = `<div class="alert alert-success">已创建对象 "${escHtml(data.name)}"，请点击「确认保存」</div>`;
            } catch(e) {
                statusEl.innerHTML = `<div class="text-danger">创建失败: ${e.message}</div>`;
            }
        });
    };

    window.reevaluateStatus = async function(idx, objectId) {
        if (!objectId) return;
        const item = currentItems[idx];
        try {
            const resp = await fetch('/api/reevaluate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ object_id: parseInt(objectId), metrics: item.metrics || {} })
            });
            const data = await resp.json();
            if (data.ok && data.result !== item.result) {
                item.result = data.result;
                renderItems(currentItems);
            }
        } catch(e) {}
    };

    btnSave.addEventListener('click', async () => {
        if (currentItems.length === 0) return;
        saveStatus.innerHTML = '<div class="alert alert-info">保存中...</div>';

        try {
            const resp = await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({items: currentItems})
            });
            const data = await resp.json();
            if (data.error) {
                saveStatus.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                return;
            }
            let msg = `成功保存 ${data.saved} 条巡检记录`;
            if (data.created > 0) msg += `，自动创建 ${data.created} 个新位置`;
            if (data.skipped > 0) msg += `，${data.skipped} 条未匹配到位置`;
            var viewLink = data.object_id ? ` <a href="/object/${data.object_id}" class="btn btn-sm btn-outline-primary" style="text-decoration:none;">查看 →</a>` : '';
            saveStatus.innerHTML = `<div class="alert alert-success">${msg}${viewLink}</div>`;
            btnSave.style.display = 'none';
        } catch(e) {
            saveStatus.innerHTML = `<div class="alert alert-danger">保存失败: ${e.message}</div>`;
        }
    });

    function escHtml(s) {
        const d = document.createElement('div');
        d.textContent = s || '';
        return d.innerHTML;
    }
    function escAttr(s) {
        return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
})();
</script>

<style>
.drop-zone {
    border: 2px dashed var(--border-input);
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: var(--bg-input);
}
.drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: var(--primary-soft);
}
.drop-zone-content p {
    color: var(--text-secondary);
    margin: 0.75rem 0 0.25rem;
    font-weight: 500;
}
.drop-zone-content small {
    color: var(--text-faint);
}
.ocr-card {
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--bg-elevated);
    margin-bottom: 0.625rem;
    overflow: hidden;
    transition: border-color 0.2s;
}
.ocr-card:hover {
    border-color: var(--border-hover);
}
.ocr-card-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.65rem 0.85rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg-input);
}
.ocr-title-input {
    flex: 1;
    min-width: 0;
    border: none;
    background: transparent;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text);
    outline: none;
    padding: 0.2rem 0;
}
.ocr-card-actions {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex-shrink: 0;
}
.location-badge {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 0.2rem 0.55rem;
    border-radius: 6px;
    background: rgba(99,102,241,0.12);
    color: #6366f1;
    border: 1px solid rgba(99,102,241,0.25);
    white-space: nowrap;
}
.point-badge {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 0.2rem 0.55rem;
    border-radius: 6px;
    background: var(--success-bg);
    color: var(--success);
    border: 1px solid var(--success-border);
    white-space: nowrap;
}
.point-select {
    font-size: 0.72rem;
    padding: 0.2rem 0.4rem;
    border-radius: 6px;
    border: 1px solid var(--border-input);
    background: var(--bg-input);
    color: var(--text);
    outline: none;
    max-width: 150px;
}
.point-select.point-ok {
    border-color: var(--success-border);
    color: var(--success);
}
.point-select.point-err {
    border-color: var(--danger-border);
    color: var(--danger);
}
.dashboard-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    background: var(--accent-soft, rgba(0,150,255,0.12));
    color: var(--accent, #0096ff);
    border: 1px solid var(--accent-border, rgba(0,150,255,0.25));
    white-space: nowrap;
}
.location-cat-badge {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 0.2rem 0.55rem;
    border-radius: 6px;
    background: rgba(99,102,241,0.12);
    color: #6366f1;
    border: 1px solid rgba(99,102,241,0.25);
    white-space: nowrap;
}
.inspector-badge {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 0.2rem 0.55rem;
    border-radius: 6px;
    background: rgba(139,92,246,0.15);
    color: #8b5cf6;
    border: 1px solid rgba(139,92,246,0.3);
    white-space: nowrap;
}
.inspector-select {
    font-size: 0.72rem;
    padding: 0.2rem 0.4rem;
    border-radius: 6px;
    border: 1px solid var(--border-input);
    background: var(--bg-input);
    color: var(--text);
    outline: none;
    max-width: 100px;
}
.inspector-select.inspector-ok {
    border-color: rgba(139,92,246,0.3);
    color: #8b5cf6;
}
.inspector-select.inspector-err {
    border-color: var(--danger-border);
    color: var(--danger);
}
.ocr-del-btn {
    width: 24px;
    height: 24px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--text-muted);
    font-size: 0.75rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
}
.ocr-del-btn:hover {
    background: var(--danger-bg);
    color: var(--danger);
}
.ocr-card-body {
    padding: 0.6rem 0.85rem 0.7rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
}
.ocr-time {
    font-size: 0.75rem;
    color: var(--text-muted);
    white-space: nowrap;
}
.result-badge {
    font-size: 0.72rem;
    font-weight: 500;
    padding: 0.2rem 0.5rem;
    border-radius: 6px;
    white-space: nowrap;
}
.result-ok {
    background: var(--success-bg);
    color: var(--success);
    border: 1px solid var(--success-border);
}
.result-err {
    background: var(--danger-bg);
    color: var(--danger);
    border: 1px solid var(--danger-border);
}
.result-warn {
    background: rgba(251,191,36,0.15);
    color: #f59e0b;
    border: 1px solid rgba(251,191,36,0.3);
}
.ocr-status-detail {
    font-size: 0.72rem;
    color: var(--text-secondary);
    white-space: nowrap;
}
.point-select-group {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
}
.quick-create-btn {
    width: 24px;
    height: 24px;
    border: 1px solid var(--border-input);
    border-radius: 6px;
    background: var(--bg-input);
    color: var(--accent);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    padding: 0;
    line-height: 1;
}
.quick-create-btn:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
}
.quick-create-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 1rem;
}
.quick-create-dialog {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.quick-create-dialog h5 {
    margin-bottom: 1rem;
    font-weight: 600;
}
</style>
{% endblock %}
