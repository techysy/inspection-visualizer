{% extends "base.html" %}

{% block title %}批量导入 - 巡检数据可视化{% endblock %}

{% block content %}
<h1 class="mb-4">批量导入</h1>

<div class="row g-4">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">导入巡检记录</h5>
                <p class="card-text mb-3">支持粘贴 Markdown 表格、CSV 数据或上传 .md 文件</p>

                <div id="drop-zone" class="drop-zone mb-3">
                    <div class="drop-zone-content">
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                        </svg>
                        <p>拖入 .md 文件或点击选择</p>
                        <small class="text-muted">支持 Markdown 巡检日报文件</small>
                    </div>
                    <input type="file" id="file-input" accept=".md,.markdown" style="display:none">
                </div>

                <div id="file-info" style="display:none" class="mb-3">
                    <div class="alert alert-info" style="font-size:0.85rem;">
                        <strong id="file-name"></strong>
                        <span id="file-size" class="ms-2"></span>
                        <button id="btn-clear-file" class="btn btn-sm btn-outline-danger ms-2">移除</button>
                    </div>
                </div>

                <textarea id="records-text" class="import-textarea" rows="10" placeholder="或粘贴数据，支持以下格式：&#10;&#10;Markdown 表格：&#10;| 位置名称 | 巡检时间 | 结果 | 巡检人员 | 状态详情 | 备注 |&#10;|----------|----------|------|----------|----------|------|&#10;| 中江县 | 2024-01-15 10:00 | 正常 | 张三 | 在线率 99% | 无 |&#10;| 三园区垃圾站 | 2024-01-15 11:00 | 异常 | 李四 | 离线5台 | 需检查 |&#10;&#10;CSV 格式（逗号分隔）：&#10;中江县,2024-01-15 10:00,正常,张三,在线率 99%,无&#10;三园区垃圾站,2024-01-15 11:00,异常,李四,离线5台,需检查"></textarea>

                <div class="mt-3 d-flex gap-2">
                    <button id="btn-import-records" class="btn btn-primary">导入巡检记录</button>
                    <span id="records-status" class="import-status"></span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileInfo = document.getElementById('file-info');
    const fileName = document.getElementById('file-name');
    const fileSize = document.getElementById('file-size');
    const btnClearFile = document.getElementById('btn-clear-file');
    const recordsText = document.getElementById('records-text');

    // 文件上传
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
        if (!file || !file.name.endsWith('.md')) {
            alert('请选择 .md 文件');
            return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
            recordsText.value = e.target.result;
            fileName.textContent = file.name;
            fileSize.textContent = (file.size / 1024).toFixed(1) + ' KB';
            fileInfo.style.display = 'block';
            dropZone.style.display = 'none';
        };
        reader.readAsText(file);
    }

    btnClearFile.addEventListener('click', () => {
        recordsText.value = '';
        fileInfo.style.display = 'none';
        dropZone.style.display = 'block';
        fileInput.value = '';
    });

    // 解析 Markdown 表格或 CSV
    function parseData(text) {
        if (!text.trim()) return [];

        const lines = text.trim().split('\n');
        const data = [];

        // 检测是否为 Markdown 表格
        const isMarkdown = lines.some(line => line.trim().startsWith('|'));

        if (isMarkdown) {
            // 解析 Markdown 表格
            let headerFound = false;
            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed.startsWith('|')) continue;

                // 移除首尾的 |
                const content = trimmed.slice(1, -1);
                const cells = content.split('|').map(c => c.trim());

                // 跳过分隔行（如 |---|---|）
                if (cells.every(c => c.match(/^[-:]+$/))) continue;

                // 第一行是标题行，跳过
                if (!headerFound) {
                    headerFound = true;
                    continue;
                }

                data.push(cells);
            }
        } else {
            // 解析 CSV
            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed) continue;

                const cells = trimmed.split(',').map(c => c.trim());
                data.push(cells);
            }
        }

        return data;
    }

    // 导入巡检记录
    document.getElementById('btn-import-records').addEventListener('click', async () => {
        const text = recordsText.value;
        const status = document.getElementById('records-status');

        const data = parseData(text);
        if (data.length === 0) {
            status.innerHTML = '<span style="color:var(--danger);">未识别到有效数据</span>';
            return;
        }

        const records = data.map(row => ({
            point_name: row[0] || '',
            timestamp: row[1] || '',
            result: row[2] || '正常',
            inspector_name: row[3] || '',
            status_detail: row[4] || '',
            notes: row[5] || ''
        })).filter(r => r.point_name);

        if (records.length === 0) {
            status.innerHTML = '<span style="color:var(--danger);">位置名称不能为空</span>';
            return;
        }

        status.innerHTML = '<span style="color:var(--text-muted);">导入中...</span>';

        try {
            const resp = await fetch('/api/records/import', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({records})
            });
            const result = await resp.json();
            if (result.error) {
                status.innerHTML = '<span style="color:var(--danger);">' + result.error + '</span>';
            } else {
                let msg = '成功导入 ' + result.imported + ' 条记录';
                if (result.created > 0) msg += '，自动创建 ' + result.created + ' 个位置';
                if (result.skipped > 0) msg += '，跳过 ' + result.skipped + ' 条';
                status.innerHTML = '<span style="color:var(--success);">' + msg + '</span>';
            }
        } catch(e) {
            status.innerHTML = '<span style="color:var(--danger);">导入失败: ' + e.message + '</span>';
        }
    });
})();
</script>

<style>
.drop-zone {
    border: 2px dashed var(--border-input);
    border-radius: 12px;
    padding: 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: var(--bg-input);
}
.drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: var(--primary-soft);
}
.drop-zone-content p {
    color: var(--text-secondary);
    margin: 0.5rem 0 0.25rem;
    font-weight: 500;
}
.import-textarea {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border-input);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-size: 0.85rem;
    font-family: 'Consolas', 'Monaco', monospace;
    resize: vertical;
    outline: none;
}
.import-textarea:focus {
    border-color: var(--accent);
}
.import-status {
    font-size: 0.85rem;
}
</style>
{% endblock %}
