<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}巡检数据可视化{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">Inspection<span>Tracker</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}" href="/">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main.upload' %}active{% endif %}" href="/upload">截图识别</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main.bulk_import' %}active{% endif %}" href="/import">导入导出</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main.objects' %}active{% endif %}" href="/objects">对象管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main.inspectors' %}active{% endif %}" href="/inspectors">人员管理</a>
                    </li>
                    <li class="nav-item ms-2">
                        <button id="theme-toggle" class="theme-toggle-btn" title="切换主题">
                            <svg class="icon icon-auto" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                            <svg class="icon icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                            <svg class="icon icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    (function() {
        const root = document.documentElement;
        const btn = document.getElementById('theme-toggle');
        const STORAGE_KEY = 'theme-preference';

        const themes = ['dark', 'light', 'auto'];
        const icons = { dark: 'icon-dark', light: 'icon-light', auto: 'icon-auto' };

        function getSystemTheme() {
            return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }

        function applyTheme(theme) {
            root.setAttribute('data-theme', theme);
            const resolved = theme === 'auto' ? getSystemTheme() : theme;
            root.setAttribute('data-resolved', resolved);

            btn.querySelectorAll('.icon').forEach(i => i.style.display = 'none');
            btn.querySelector('.' + icons[theme]).style.display = 'block';
        }

        function getSaved() {
            return localStorage.getItem(STORAGE_KEY) || 'dark';
        }

        function save(t) {
            localStorage.setItem(STORAGE_KEY, t);
        }

        applyTheme(getSaved());

        // 三连击进入 OCR 管理页面
        let clickCount = 0;
        let clickTimer = null;

        btn.addEventListener('click', function(e) {
            clickCount++;
            if (clickCount === 3) {
                // 三连击 → 进入 OCR 管理
                clearTimeout(clickTimer);
                clickCount = 0;
                window.location.href = '/ocr-admin';
                return;
            }
            // 重置计数器
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => {
                if (clickCount < 3) {
                    // 单击或双击 → 切换主题
                    const current = getSaved();
                    const next = themes[(themes.indexOf(current) + 1) % themes.length];
                    save(next);
                    applyTheme(next);
                }
                clickCount = 0;
            }, 300);
        });

        window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function() {
            if (getSaved() === 'auto') applyTheme('auto');
        });
    })();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
