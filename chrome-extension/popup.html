<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img src="icons/icon48.png" alt="icon" class="logo">
      <span class="title">巡检截图识别</span>
    </div>
    <div class="header-right">
      <span class="version">v2.1</span>
    </div>
  </div>

  <div class="content">
    <div id="loginBanner" class="login-banner hidden">
      <span>系统需要登录</span>
      <div class="login-row">
        <input type="text" id="loginUsername" placeholder="用户名">
        <input type="password" id="loginPassword" placeholder="密码">
        <button id="btnLogin" class="btn btn-sm">登录</button>
      </div>
      <div id="loginBannerError" class="login-error hidden"></div>
    </div>

    <button id="btnCapture" class="btn btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/>
      </svg>
      <span>框选截图识别</span>
    </button>
    <div class="shortcut-hint">快捷键: Ctrl+Shift+S</div>

    <div id="previewArea" class="preview-area hidden">
      <img id="previewImg" src="" alt="preview">
    </div>

    <div id="status" class="status hidden"></div>

    <div id="results" class="results"></div>

    <div id="rawText" class="raw-text hidden"></div>

    <div id="actionButtons" class="action-buttons hidden">
      <div class="save-row">
        <button id="btnSave" class="btn btn-success">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
          </svg>
          <span>保存到系统</span>
        </button>
        <button id="btnView" class="btn btn-view hidden">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          <span>查看</span>
        </button>
      </div>
    </div>

    <div id="settingsArea" class="settings-bar">
      <div class="backup-row">
        <label class="toggle-label">
          <input type="checkbox" id="backupToggle" class="toggle-cb" checked>
          <span class="toggle-slider"></span>
          <span class="toggle-text">截图后自动保存</span>
        </label>
        <a id="btnOpenBackup" class="folder-btn" title="打开截图预览">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          <span id="backupPath" class="folder-path"></span>
        </a>
      </div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
